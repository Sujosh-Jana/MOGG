<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MOGGOFF - Institution Leaderboards</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<meta name="description" content="Opt-in institution leaderboards for Chad and Stacy rankings.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="/ranked-config.js"></script>
<style>
:root {
  --bg: #09090a;
  --panel: #121216;
  --panel-2: #18181d;
  --panel-3: #202027;
  --line: #2c2c34;
  --line-soft: #222229;
  --text: #f1f1ef;
  --muted: #96969f;
  --faint: #62626c;
  --gold: #f0b429;
  --blue: #7dd3fc;
  --green: #34d399;
  --red: #f43f5e;
  --radius: 8px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { min-height: 100%; background: var(--bg); color: var(--text); }
body {
  font-family: "JetBrains Mono", Consolas, monospace;
  -webkit-font-smoothing: antialiased;
}
a { color: inherit; text-decoration: none; }
button, input, select { font: inherit; }
button { cursor: pointer; }
img { display: block; }
::selection { background: var(--gold); color: #050505; }

#app { min-height: 100vh; display: flex; flex-direction: column; }

.ticker {
  height: 34px;
  display: flex;
  align-items: center;
  overflow: hidden;
  border-bottom: 1px solid var(--line-soft);
  background: var(--panel);
  white-space: nowrap;
}
.ticker-label {
  height: 100%;
  display: flex;
  align-items: center;
  padding: 0 12px;
  background: var(--gold);
  color: #070707;
  font-size: 11px;
  font-weight: 800;
  text-transform: uppercase;
  z-index: 1;
}
.ticker-track {
  display: inline-flex;
  min-width: 100%;
  animation: ticker 34s linear infinite;
}
.ticker:hover .ticker-track { animation-play-state: paused; }
@keyframes ticker {
  from { transform: translateX(0); }
  to { transform: translateX(-50%); }
}
.ticker-item {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  min-height: 34px;
  padding: 0 18px;
  border-right: 1px solid var(--line-soft);
  color: var(--muted);
  font-size: 12px;
}
.ticker-item b { color: var(--text); font-weight: 700; }
.ticker-rank { color: var(--gold); font-weight: 800; }
.ticker-score { color: var(--green); }

.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 20px;
  padding: 15px 24px;
  border-bottom: 1px solid var(--line-soft);
  background: linear-gradient(180deg, #141417, #09090a);
}
.brand {
  display: inline-flex;
  align-items: center;
  gap: 9px;
  font-size: 17px;
  font-weight: 800;
}
.brand-dot {
  width: 9px;
  height: 9px;
  border-radius: 99px;
  background: var(--green);
  box-shadow: 0 0 12px rgba(52, 211, 153, .8);
}
.nav {
  display: flex;
  align-items: center;
  justify-content: flex-end;
  gap: 14px;
  color: var(--muted);
  font-size: 12px;
}
.nav a, .nav button {
  border: 0;
  background: transparent;
  color: var(--muted);
}
.nav a:hover, .nav button:hover { color: var(--text); }

main {
  width: 100%;
  max-width: 960px;
  margin: 0 auto;
  padding: 30px 20px 72px;
  flex: 1;
}

.notice {
  margin-bottom: 18px;
  padding: 11px 13px;
  border: 1px solid rgba(125, 211, 252, .28);
  border-radius: var(--radius);
  background: rgba(125, 211, 252, .06);
  color: #b8eaff;
  font-size: 11px;
  line-height: 1.6;
}
.eyebrow {
  color: var(--gold);
  font-size: 11px;
  font-weight: 800;
  text-transform: uppercase;
  margin-bottom: 8px;
}
h1 {
  margin-bottom: 7px;
  font-size: 29px;
  line-height: 1.15;
  letter-spacing: 0;
}
.sub {
  color: var(--muted);
  font-size: 13px;
  line-height: 1.7;
  margin-bottom: 25px;
}

.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 7px;
  min-height: 38px;
  border: 1px solid transparent;
  border-radius: 7px;
  background: var(--gold);
  color: #070707;
  padding: 9px 15px;
  font-size: 12px;
  font-weight: 800;
  transition: transform .1s, opacity .15s, border-color .15s;
}
.btn:hover { opacity: .92; }
.btn:active { transform: scale(.98); }
.btn:disabled { opacity: .48; cursor: not-allowed; transform: none; }
.btn-secondary {
  border-color: var(--line);
  background: var(--panel-2);
  color: var(--text);
}
.btn-danger { background: var(--red); color: #fff; }
.btn-sm { min-height: 30px; padding: 6px 10px; font-size: 11px; }

.search {
  display: flex;
  align-items: center;
  gap: 10px;
  min-height: 48px;
  margin-bottom: 16px;
  padding: 0 14px;
  border: 1px solid var(--line);
  border-radius: var(--radius);
  background: var(--panel-2);
}
.search span { color: var(--faint); }
.search input {
  width: 100%;
  border: 0;
  outline: 0;
  background: transparent;
  color: var(--text);
  font-size: 13px;
}

.tabs, .admin-tabs {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 18px;
}
.tab {
  min-height: 34px;
  padding: 7px 13px;
  border: 1px solid var(--line);
  border-radius: 999px;
  background: transparent;
  color: var(--muted);
  font-size: 12px;
  font-weight: 700;
}
.tab.active {
  border-color: var(--text);
  background: var(--text);
  color: #070707;
}

.institution-list {
  display: flex;
  flex-direction: column;
  overflow: hidden;
  border: 1px solid var(--line);
  border-radius: var(--radius);
  background: var(--line-soft);
  gap: 1px;
}
.institution-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 18px;
  padding: 15px 16px;
  background: var(--panel-2);
}
.institution-row:hover { background: var(--panel-3); }
.institution-name { font-size: 13.5px; font-weight: 800; }
.institution-meta {
  margin-top: 4px;
  color: var(--faint);
  font-size: 11px;
}
.chevron { color: var(--faint); font-weight: 800; }

.breadcrumb {
  color: var(--faint);
  font-size: 11px;
  margin-bottom: 16px;
}
.breadcrumb a { color: var(--muted); }
.leader-head {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 16px;
  flex-wrap: wrap;
  margin-bottom: 18px;
}
.switch {
  display: inline-flex;
  padding: 3px;
  border: 1px solid var(--line);
  border-radius: var(--radius);
  background: var(--panel-2);
}
.switch button {
  min-width: 94px;
  border: 0;
  border-radius: 6px;
  background: transparent;
  color: var(--muted);
  padding: 8px 13px;
  font-size: 12px;
  font-weight: 800;
}
.switch button.active { background: var(--gold); color: #070707; }

.candidate-list { display: grid; gap: 8px; }
.candidate-row {
  display: grid;
  grid-template-columns: 44px 58px minmax(0, 1fr) auto;
  align-items: center;
  gap: 14px;
  min-height: 82px;
  padding: 12px 14px;
  border: 1px solid var(--line);
  border-radius: var(--radius);
  background: var(--panel-2);
}
.candidate-row:hover { border-color: #3a3a45; }
.candidate-row.top { border-color: rgba(240, 180, 41, .8); box-shadow: inset 0 0 0 1px rgba(240, 180, 41, .5); }
.avatar-link { display: block; line-height: 0; }
.candidate-info-link { display: block; min-width: 0; text-decoration: none; color: inherit; }
.rank {
  text-align: center;
  color: var(--faint);
  font-size: 19px;
  font-weight: 800;
  font-variant-numeric: tabular-nums;
}
.top .rank { color: var(--gold); }
.avatar {
  width: 58px;
  height: 58px;
  border: 1px solid var(--line);
  border-radius: var(--radius);
  object-fit: cover;
  background: var(--panel);
}
.profile-banner-wrap {
  position: relative;
  margin-bottom: 56px;
}
.profile-banner {
  width: 100%;
  height: 180px;
  border-radius: var(--radius);
  border: 1px solid var(--line);
  object-fit: cover;
  background: linear-gradient(135deg, #1a1a20, #232329);
  display: block;
}
.profile-avatar-lg {
  position: absolute;
  left: 20px;
  bottom: -44px;
  width: 96px;
  height: 96px;
  border-radius: 14px;
  border: 4px solid var(--bg);
  object-fit: cover;
  background: var(--panel);
}
.profile-edit-btn {
  position: absolute;
  right: 14px;
  bottom: 14px;
}
.social-row {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 12px;
}
.social-chip {
  padding: 6px 12px;
  border: 1px solid var(--line);
  border-radius: 99px;
  font-size: 12px;
  color: var(--muted);
  text-decoration: none;
}
.social-chip:hover { border-color: var(--gold); color: var(--gold); }
.listing-chip {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  padding: 12px 14px;
  border: 1px solid var(--line);
  border-radius: var(--radius);
  background: var(--panel-2);
  text-decoration: none;
  color: inherit;
  margin-bottom: 10px;
}
.listing-chip:hover { border-color: #3a3a45; }
.candidate-name {
  overflow: hidden;
  text-overflow: ellipsis;
  color: var(--text);
  font-size: 14px;
  font-weight: 800;
  white-space: nowrap;
}
.candidate-meta {
  margin-top: 4px;
  color: var(--muted);
  font-size: 11px;
  line-height: 1.55;
}
.candidate-meta .score { color: var(--green); font-weight: 800; }
.candidate-meta .down { color: var(--red); }
.votes {
  display: inline-grid;
  grid-template-columns: 36px 36px;
  gap: 7px;
}
.vote {
  width: 36px;
  height: 36px;
  border: 1px solid var(--line);
  border-radius: var(--radius);
  background: var(--panel);
  color: var(--muted);
  font-size: 15px;
}
.vote:hover { border-color: var(--muted); color: var(--text); }
.vote.on-up { border-color: var(--green); background: rgba(52, 211, 153, .13); color: var(--green); }
.vote.on-down { border-color: var(--red); background: rgba(244, 63, 94, .13); color: var(--red); }

.card {
  border: 1px solid var(--line);
  border-radius: var(--radius);
  background: var(--panel-2);
  padding: 20px;
}
.form-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 14px; }
.field { margin-bottom: 15px; }
.field:last-child { margin-bottom: 0; }
.field label {
  display: block;
  margin-bottom: 6px;
  color: var(--muted);
  font-size: 11px;
  font-weight: 700;
}
.field input, .field select, .field textarea {
  width: 100%;
  min-height: 42px;
  border: 1px solid var(--line);
  border-radius: 7px;
  outline: 0;
  background: var(--panel);
  color: var(--text);
  padding: 10px 11px;
  font-size: 13px;
  font-family: inherit;
  resize: vertical;
}
.field input:focus, .field select:focus, .field textarea:focus { border-color: var(--gold); }

.profile-head {
  display: flex;
  align-items: center;
  gap: 20px;
  margin: 18px 0;
  flex-wrap: wrap;
}
.social-row {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 20px;
}
.social-pill {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 14px;
  border-radius: 999px;
  border: 1px solid var(--line);
  background: var(--panel-2);
  color: var(--text) !important;
  text-decoration: none !important;
  font-size: 12.5px;
  font-weight: 600;
}
.social-pill:hover { border-color: var(--gold); }
.radio-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; }
.radio {
  min-height: 42px;
  display: flex;
  align-items: center;
  justify-content: center;
  border: 1px solid var(--line);
  border-radius: 7px;
  background: var(--panel);
  color: var(--muted);
  font-size: 12px;
  font-weight: 800;
}
.radio.active { border-color: var(--gold); color: var(--gold); }
.drop {
  min-height: 116px;
  display: grid;
  place-items: center;
  gap: 9px;
  border: 1px dashed #444451;
  border-radius: var(--radius);
  background: var(--panel);
  color: var(--faint);
  text-align: center;
  font-size: 12px;
}
.drop img { width: 82px; height: 82px; border-radius: var(--radius); object-fit: cover; }
.msg {
  margin-bottom: 14px;
  padding: 10px 12px;
  border-radius: 7px;
  font-size: 12px;
  line-height: 1.6;
}
.msg.ok { border: 1px solid var(--green); background: rgba(52, 211, 153, .1); color: #a7f3d0; }
.msg.err { border: 1px solid var(--red); background: rgba(244, 63, 94, .1); color: #fecdd3; }
.msg a, .link { color: var(--blue); text-decoration: underline; }
.empty {
  padding: 28px;
  border: 1px solid var(--line);
  border-radius: var(--radius);
  background: var(--panel-2);
  color: var(--faint);
  text-align: center;
  font-size: 12px;
  line-height: 1.7;
}
.loading {
  width: 18px;
  height: 18px;
  margin: 44px auto;
  border: 2px solid var(--line);
  border-top-color: var(--gold);
  border-radius: 999px;
  animation: spin .7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

#toastHost {
  position: fixed;
  bottom: 18px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 999;
  display: flex;
  flex-direction: column;
  gap: 8px;
  align-items: center;
  pointer-events: none;
}
.toast {
  padding: 10px 16px;
  border-radius: 999px;
  font-size: 12.5px;
  font-weight: 600;
  box-shadow: 0 8px 24px rgba(0,0,0,.4);
  animation: toast-in .18s ease-out;
  border: 1px solid var(--line);
  background: var(--panel);
  color: var(--text);
}
.toast.err { border-color: var(--red); color: #fecdd3; }
.toast.ok { border-color: var(--green); color: #a7f3d0; }
@keyframes toast-in { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

.table-wrap {
  overflow-x: auto;
  border: 1px solid var(--line);
  border-radius: var(--radius);
}
table {
  width: 100%;
  min-width: 620px;
  border-collapse: collapse;
  background: var(--panel-2);
  font-size: 12px;
}
th, td { padding: 10px; border-bottom: 1px solid var(--line-soft); text-align: left; }
th { color: var(--faint); font-size: 11px; font-weight: 800; }
tr:last-child td { border-bottom: 0; }
.badge {
  display: inline-flex;
  align-items: center;
  min-height: 20px;
  padding: 2px 8px;
  border-radius: 999px;
  background: rgba(240, 180, 41, .14);
  color: var(--gold);
  font-size: 10px;
  font-weight: 800;
}
.badge.confirmed, .badge.approved { background: rgba(52, 211, 153, .14); color: var(--green); }
.badge.flagged { background: rgba(244, 63, 94, .14); color: var(--red); }
.footer-note {
  margin-top: 34px;
  color: var(--faint);
  font-size: 11px;
  line-height: 1.7;
  text-align: center;
}

@media (max-width: 700px) {
  .topbar { align-items: flex-start; flex-direction: column; padding: 14px 16px; }
  .nav { width: 100%; justify-content: space-between; gap: 9px; flex-wrap: wrap; }
  main { padding: 24px 14px 58px; }
  h1 { font-size: 24px; }
  .candidate-row { grid-template-columns: 35px 52px minmax(0, 1fr); gap: 10px; }
  .avatar { width: 52px; height: 52px; }
  .votes { grid-column: 1 / -1; grid-template-columns: 1fr 1fr; }
  .vote { width: 100%; }
  .form-grid { grid-template-columns: 1fr; gap: 0; }
  .switch { width: 100%; }
  .switch button { flex: 1; min-width: 0; }
}
</style>
</head>
<body>
<div id="app">
  <div class="ticker">
    <div class="ticker-label">LIVE RANK</div>
    <div class="ticker-track" id="tickerTrack">
      <span class="ticker-item">loading rankings...</span>
    </div>
  </div>
  <div class="topbar">
    <a class="brand" href="#/">MOGGOFF</a>
    <nav class="nav" id="nav"></nav>
  </div>
  <main id="main"><div class="loading"></div></main>
  <div id="toastHost"></div>
</div>

<script>
const firebaseConfig = window.RANKED_FIREBASE_CONFIG || {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT_ID",
  storageBucket: "YOUR_PROJECT.appspot.com",
  messagingSenderId: "YOUR_SENDER_ID",
  appId: "YOUR_APP_ID"
};

const hasFirebaseConfig = firebaseConfig.apiKey !== "YOUR_API_KEY" && !!window.firebase;
const DEMO_KEY = "ranked-demo-v1";
let auth = null;
let currentUser = null;
let currentUserDoc = null;
let homeType = "all";
let selectedNominationPhoto = null;
let pendingRequestCount = 0;

if (hasFirebaseConfig && window.firebase) {
  firebase.initializeApp(firebaseConfig);
  auth = firebase.auth();
}

const seed = {
  sessionUid: null,
  users: [
    { id: "admin-demo", email: "admin@ranked.local", password: "admin123", isAdmin: true, handle: "admin", createdAt: Date.now() }
  ],
  handles: { admin: "admin-demo" },
  institutions: [
    { id: "harvard", name: "Harvard University", type: "college", status: "approved", candidateCount: 4, createdAt: Date.now() - 900000 },
    { id: "stanford", name: "Stanford University", type: "college", status: "approved", candidateCount: 2, createdAt: Date.now() - 800000 },
    { id: "google", name: "Google", type: "company", status: "approved", candidateCount: 2, createdAt: Date.now() - 700000 }
  ],
  nominations: [],
  candidates: [
    { id: "c1", name: "Alex Rivera", photoURL: avatarData("AR", "#14213d"), gender: "chad", institutionId: "harvard", status: "confirmed", confirmToken: "demo-alex", nominatedBy: "admin-demo", confirmedUid: "admin-demo", upvotes: 42, downvotes: 4, score: 42, createdAt: Date.now() - 600000 },
    { id: "c2", name: "Maya Chen", photoURL: avatarData("MC", "#2f1b45"), gender: "stacy", institutionId: "harvard", status: "confirmed", confirmToken: "demo-maya", nominatedBy: "admin-demo", confirmedUid: "admin-demo", upvotes: 38, downvotes: 3, score: 38, createdAt: Date.now() - 560000 },
    { id: "c3", name: "Noah Singh", photoURL: avatarData("NS", "#193d2f"), gender: "chad", institutionId: "harvard", status: "confirmed", confirmToken: "demo-noah", nominatedBy: "admin-demo", confirmedUid: "admin-demo", upvotes: 29, downvotes: 7, score: 29, createdAt: Date.now() - 520000 },
    { id: "c4", name: "Iris Patel", photoURL: avatarData("IP", "#3d2916"), gender: "stacy", institutionId: "harvard", status: "confirmed", confirmToken: "demo-iris", nominatedBy: "admin-demo", confirmedUid: "admin-demo", upvotes: 25, downvotes: 2, score: 25, createdAt: Date.now() - 500000 },
    { id: "c5", name: "Sofia Lane", photoURL: avatarData("SL", "#16343d"), gender: "stacy", institutionId: "stanford", status: "confirmed", confirmToken: "demo-sofia", nominatedBy: "admin-demo", confirmedUid: "admin-demo", upvotes: 31, downvotes: 5, score: 31, createdAt: Date.now() - 490000 },
    { id: "c6", name: "Ryan Brooks", photoURL: avatarData("RB", "#35243a"), gender: "chad", institutionId: "stanford", status: "confirmed", confirmToken: "demo-ryan", nominatedBy: "admin-demo", confirmedUid: "admin-demo", upvotes: 27, downvotes: 2, score: 27, createdAt: Date.now() - 470000 },
    { id: "c7", name: "Anika Rao", photoURL: avatarData("AR", "#273819"), gender: "stacy", institutionId: "google", status: "confirmed", confirmToken: "demo-anika", nominatedBy: "admin-demo", confirmedUid: "admin-demo", upvotes: 21, downvotes: 1, score: 21, createdAt: Date.now() - 450000 },
    { id: "c8", name: "Ethan Cole", photoURL: avatarData("EC", "#3b1d24"), gender: "chad", institutionId: "google", status: "confirmed", confirmToken: "demo-ethan", nominatedBy: "admin-demo", confirmedUid: "admin-demo", upvotes: 19, downvotes: 4, score: 19, createdAt: Date.now() - 430000 }
  ],
  votes: []
};

function loadDemo() {
  const saved = localStorage.getItem(DEMO_KEY);
  const data = saved ? JSON.parse(saved) : JSON.parse(JSON.stringify(seed));
  // Backfill fields added by later versions of this app so old saved demo
  // state (or a fresh copy of `seed`) never crashes the handle/invite flows.
  if (!data.handles) data.handles = {};
  (data.users || []).forEach(user => {
    if (user.handle === undefined) user.handle = null;
    if (user.handle && !data.handles[user.handle]) data.handles[user.handle] = user.id;
    if (user.displayName === undefined) user.displayName = null;
    if (user.avatarURL === undefined) user.avatarURL = null;
    if (user.bannerURL === undefined) user.bannerURL = null;
    if (user.bio === undefined) user.bio = "";
    if (!user.socialLinks) user.socialLinks = {};
  });

  });

function uid() { return Math.random().toString(36).slice(2) + Date.now().toString(36); }

// Demo-mode mirror of the backend's per-institution vote slot model: a voter
// can hold at most one upvote and one downvote per institution (moving that
// slot between candidates), and never both directions on the same candidate.
function applyDemoVote(candidateId, institutionId, direction) {
  const candidate = demo.candidates.find(item => item.id === candidateId);
  if (!candidate || candidate.status !== "confirmed") throw new Error("Candidate not found.");
  const voterUid = currentUser.uid;
  const opposite = direction === "up" ? "down" : "up";
  const bump = (id, dir, delta) => {
    const item = demo.candidates.find(c => c.id === id);
    if (!item) return;
    const key = dir === "up" ? "upvotes" : "downvotes";
    item[key] = Math.max(0, (item[key] || 0) + delta);
    item.score = (item.upvotes || 0) - (item.downvotes || 0);
  };
  const sameSlot = demo.votes.find(v => v.voterUid === voterUid && v.institutionId === institutionId && v.direction === direction);
  const oppositeSlot = demo.votes.find(v => v.voterUid === voterUid && v.institutionId === institutionId && v.direction === opposite);

  if (sameSlot && sameSlot.candidateId === candidateId) {
    bump(candidateId, direction, -1);
    demo.votes = demo.votes.filter(v => v !== sameSlot);
  } else {
    if (sameSlot) bump(sameSlot.candidateId, direction, -1);
    if (oppositeSlot && oppositeSlot.candidateId === candidateId) {
      bump(candidateId, opposite, -1);
      demo.votes = demo.votes.filter(v => v !== oppositeSlot);
    }
    bump(candidateId, direction, 1);
    if (sameSlot) { sameSlot.candidateId = candidateId; sameSlot.updatedAt = Date.now(); }
    else demo.votes.push({ id: uid(), candidateId, institutionId, voterUid, direction, updatedAt: Date.now() });
  }
  saveDemo();
  const active = demo.votes.find(v => v.voterUid === voterUid && v.institutionId === institutionId && v.candidateId === candidateId);
  return {
    candidateId,
    direction: active ? active.direction : null,
    upvotes: candidate.upvotes || 0,
    downvotes: candidate.downvotes || 0,
    score: (candidate.upvotes || 0) - (candidate.downvotes || 0),
  };
}

// Optimistic mirror of the backend's vote-slot logic, applied to whatever
// candidate list + myVotes map is currently on screen, so a click feels
// instant instead of waiting on a round trip. `bump(id, dir, delta)` should
// adjust that candidate's counters if it's present in the visible list.
function applyOptimisticVote(myVotes, bump, candidateId, direction) {
  const opposite = direction === "up" ? "down" : "up";
  const sameCandidateId = Object.keys(myVotes).find(id => myVotes[id] === direction);

  if (sameCandidateId === candidateId) {
    bump(candidateId, direction, -1);
    delete myVotes[candidateId];
    return null;
  }
  if (sameCandidateId) {
    bump(sameCandidateId, direction, -1);
    delete myVotes[sameCandidateId];
  }
  if (myVotes[candidateId] === opposite) {
    bump(candidateId, opposite, -1);
    delete myVotes[candidateId];
  }
  bump(candidateId, direction, 1);
  myVotes[candidateId] = direction;
  return direction;
}
function esc(value) {
  return String(value || "").replace(/[&<>"']/g, char => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[char]));
}

async function fileToDataUrl(file) {
  if (!file) return null;
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = event => resolve(event.target.result);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

// Resizes + compresses an image client-side and returns a small JPEG data URL.
// Photos are stored directly as this string on the candidate/nomination doc in
// Firestore - no Firebase Storage (and no billing plan) required.
async function compressImage(file, maxDim = 240, quality = 0.7) {
  if (!file) return null;
  const dataUrl = await fileToDataUrl(file);
  const img = await new Promise((resolve, reject) => {
    const image = new Image();
    image.onload = () => resolve(image);
    image.onerror = reject;
    image.src = dataUrl;
  });
  const scale = Math.min(1, maxDim / Math.max(img.width, img.height));
  const canvas = document.createElement("canvas");
  canvas.width = Math.max(1, Math.round(img.width * scale));
  canvas.height = Math.max(1, Math.round(img.height * scale));
  const ctx = canvas.getContext("2d");
  ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
  return canvas.toDataURL("image/jpeg", quality);
}

async function uploadPhoto(file) {
  if (!file) return null;
  return compressImage(file);
}

async function uploadBanner(file) {
  if (!file) return null;
  return compressImage(file, 960, 0.72);
}

async function apiJson(path, options = {}) {
  const headers = { ...(options.headers || {}) };
  let body = options.body;
  if (body && typeof body !== "string") {
    headers["Content-Type"] = "application/json";
    body = JSON.stringify(body);
  }
  if (hasFirebaseConfig && auth.currentUser) {
    headers.Authorization = `Bearer ${await auth.currentUser.getIdToken()}`;
  }
  const response = await fetch(`/api/ranked${path}`, { ...options, headers, body });
  const data = await response.json().catch(() => ({}));
  if (!response.ok) throw new Error(data.error || "Request failed.");
  return data;
}

// Mirrors the backend's attachOwnerProfiles: merges each candidate's shared
// site-wide identity (avatar/bio/social/displayName) from demo.users, since
// one profile is now reused across every listing that person holds.
function attachOwnerProfilesDemo(list) {
  return list.map(item => {
    if (!item.confirmedUid) return item;
    const user = demo.users.find(u => u.id === item.confirmedUid);
    if (!user) return item;
    return {
      ...item,
      photoURL: user.avatarURL || item.photoURL || null,
      bio: user.bio || item.bio || "",
      socialLinks: (user.socialLinks && Object.keys(user.socialLinks).length) ? user.socialLinks : (item.socialLinks || {}),
      displayName: user.displayName || null,
      ownerHandle: user.handle || null,
    };
  });
}

async function getCandidates(filter = {}) {
  if (hasFirebaseConfig) {
    const params = new URLSearchParams();
    if (filter.institutionId) params.set("institutionId", filter.institutionId);
    if (filter.gender) params.set("gender", filter.gender);
    const data = await apiJson(`/candidates${params.toString() ? `?${params}` : ""}`);
    return data.candidates || [];
  }
  const list = demo.candidates
    .filter(item => !filter.institutionId || item.institutionId === filter.institutionId)
    .filter(item => !filter.gender || item.gender === filter.gender)
    .filter(item => !filter.status || item.status === filter.status)
    .sort((a, b) => filter.orderByCreated ? b.createdAt - a.createdAt : (b.score || b.upvotes || 0) - (a.score || a.upvotes || 0));
  return attachOwnerProfilesDemo(list);
}

async function getCandidateProfile(id) {
  if (hasFirebaseConfig) {
    const data = await apiJson(`/candidates/${encodeURIComponent(id)}`);
    return data;
  }
  const found = demo.candidates.find(item => item.id === id && item.status === "confirmed");
  if (!found) return { candidate: null, rank: null, totalConfirmed: null };
  const candidate = attachOwnerProfilesDemo([found])[0];
  const peers = demo.candidates
    .filter(item => item.institutionId === candidate.institutionId && item.gender === candidate.gender && item.status === "confirmed")
    .sort((a, b) => (b.score || b.upvotes || 0) - (a.score || a.upvotes || 0));
  const rank = peers.findIndex(item => item.id === id) + 1;
  return { candidate, rank: rank || null, totalConfirmed: peers.length };
}

async function getVotesForUser(institutionId) {
  if (!currentUser) return {};
  if (hasFirebaseConfig) {
    const data = await apiJson(`/votes?institutionId=${encodeURIComponent(institutionId)}`);
    const votes = {};
    (data.votes || []).forEach(vote => votes[vote.candidateId] = vote.direction);
    return votes;
  }
  return demo.votes
    .filter(item => item.voterUid === currentUser.uid && item.institutionId === institutionId)
    .reduce((votes, item) => ({ ...votes, [item.candidateId]: item.direction }), {});
}

async function getMyRequests() {
  if (!currentUser) return [];
  if (hasFirebaseConfig) {
    const data = await apiJson("/me/requests");
    return data.requests || [];

  return demo.nominations

    .sort((a, b) => b.createdAt - a.createdAt);

async function claimHandle(handle) {
  if (hasFirebaseConfig) {
    await apiJson("/me/handle", { method: "POST", body: { handle } });
    return;
  }
  if (demo.handles[handle] && demo.handles[handle] !== currentUser.uid) {
    throw new Error("That handle is already taken.");
  }
  const user = demo.users.find(item => item.id === currentUser.uid);
  if (!user) throw new Error("Account not found.");
  if (user.handle && user.handle !== handle) delete demo.handles[user.handle];
  user.handle = handle;
  demo.handles[handle] = currentUser.uid;
  saveDemo();
}

// ── Site-wide profile (banner, avatar, bio, social links) ─────────────────
// One shared identity per handle, reused everywhere that person is listed.
async function getUserProfile(handle) {
  if (hasFirebaseConfig) {
    const data = await apiJson(`/users/${encodeURIComponent(handle)}`);
    return data;
  }
  const uid = demo.handles[handle];
  if (!uid) throw new Error("No account with that handle.");
  const user = demo.users.find(item => item.id === uid) || {};
  const listings = demo.candidates
    .filter(item => item.confirmedUid === uid && item.status === "confirmed")
    .map(item => ({
      id: item.id, name: item.name, gender: item.gender,
      institutionId: item.institutionId, institutionName: item.institutionName, score: item.score,
    }));
  return {
    profile: {
      handle,
      displayName: user.displayName || null,
      avatarURL: user.avatarURL || null,
      bannerURL: user.bannerURL || null,
      bio: user.bio || "",
      socialLinks: user.socialLinks || {},
    },
    listings,
  };
}

async function updateMyProfile({ displayName, bio, socialLinks }) {
  if (hasFirebaseConfig) {
    await apiJson("/me/profile", { method: "PATCH", body: { displayName, bio, socialLinks } });
    return;
  }
  const user = demo.users.find(item => item.id === currentUser.uid);
  if (!user) throw new Error("Account not found.");
  if (typeof displayName === "string") user.displayName = displayName.trim().slice(0, 90) || null;
  if (typeof bio === "string") user.bio = bio.trim().slice(0, 280);
  if (socialLinks && typeof socialLinks === "object") {
    user.socialLinks = { ...(user.socialLinks || {}) };
    Object.keys(socialLinks).forEach(field => {
      const value = String(socialLinks[field] || "").trim();
      if (value) user.socialLinks[field] = value;
      else delete user.socialLinks[field];
    });
  }
  saveDemo();
}

async function createNomination({ candidateName, institutionId, gender, photoURL, targetHandle }) {
  if (hasFirebaseConfig) {
    await apiJson("/nominations", {
      method: "POST",
      body: { candidateName, institutionId, gender, photoURL, targetHandle },
    });
    return;
  }

  const normalizedName = candidateName.toLowerCase();
  const institution = demo.institutions.find(item => item.id === institutionId);
  const institutionName = institution ? institution.name : "";

  const targetUid = demo.handles[targetHandle];
  if (!targetUid) {
    throw new Error(`No account found with the handle @${targetHandle}. They need a MOGGOFF account to be nominated.`);
  }
  const alreadyListed = demo.candidates.some(item =>
    item.institutionId === institutionId && item.gender === gender && item.confirmedUid === targetUid && item.status === "confirmed");
  if (alreadyListed) throw new Error("This person is already ranked at that institution.");
  const pending = demo.nominations.some(item =>
    item.institutionId === institutionId && item.targetUid === targetUid && item.status === "pending");
  if (pending) throw new Error("This person already has a pending nomination request at that institution.");

  demo.nominations.push({
    id: uid(), candidateName, candidateNameNormalized: normalizedName, institutionId, institutionName, gender, photoURL,
    nominatorUid: currentUser.uid, status: "pending", targetUid, targetHandle,
    confirmToken: uid(), createdAt: Date.now(),
  });
  saveDemo();
}

async function confirmNomination(nominationId) {
  if (hasFirebaseConfig) {
    const data = await apiJson(`/nominations/${encodeURIComponent(nominationId)}/confirm`, { method: "POST" });
    return data.candidate;
  }
  const nomination = demo.nominations.find(item => item.id === nominationId);
  if (!nomination || nomination.status !== "pending" || nomination.targetUid !== currentUser.uid) {
    throw new Error("This nomination is not yours to confirm.");
  }
  const candidate = {
    id: uid(), name: nomination.candidateName, photoURL: nomination.photoURL || null, gender: nomination.gender,
    institutionId: nomination.institutionId, institutionName: nomination.institutionName || "",
    status: "confirmed", confirmToken: nomination.confirmToken || uid(), nominatedBy: nomination.nominatorUid,
    confirmedUid: currentUser.uid, upvotes: 0, downvotes: 0, score: 0, socialLinks: {}, bio: "", createdAt: Date.now(),
  };
  demo.candidates.push(candidate);
  nomination.status = "confirmed";
  nomination.candidateId = candidate.id;
  const institution = demo.institutions.find(item => item.id === nomination.institutionId);
  if (institution) institution.candidateCount = (institution.candidateCount || 0) + 1;
  saveDemo();
  return candidate;
}

async function declineNomination(nominationId) {
  if (hasFirebaseConfig) {
    await apiJson(`/nominations/${encodeURIComponent(nominationId)}/decline`, { method: "POST" });
    return;
  }
  const nomination = demo.nominations.find(item => item.id === nominationId);
  if (!nomination || nomination.status !== "pending" || nomination.targetUid !== currentUser.uid) {
    throw new Error("This nomination is not yours to decline.");
  }
  nomination.status = "flagged";
  saveDemo();
}

async function router() {
  const main = document.getElementById("main");
  main.innerHTML = `<div class="loading"></div>`;
  const parts = route();
  try {
    // Handles are now the backbone of the nomination system, so anyone
    // logged in has to pick one before doing anything else on the site.
    if (currentUser && !currentUserDoc?.handle && parts[0] !== "handle") {
      return renderChooseHandle();
    }
    if (!parts.length) return renderHome();
    if (parts[0] === "institution" && parts[1]) return renderLeaderboard(parts[1], parts[2] || "chad");
    if (parts[0] === "candidate" && parts[1]) return renderCandidateProfile(parts[1]);
    if (parts[0] === "nominate") return requireAuth(renderNominate);
    if (parts[0] === "requests") return requireAuth(renderRequests);
    if (parts[0] === "u" && parts[1]) return renderUserProfile(parts[1]);
    if (parts[0] === "handle") return requireAuth(renderChooseHandle);
    if (parts[0] === "login") return renderLogin();
    if (parts[0] === "signup") return renderSignup();
    if (parts[0] === "admin") {
      location.href = "/ranked-admin.html";
      return;
    }
    main.innerHTML = `<div class="empty">Page not found.</div>`;
  } catch (error) {
    console.error(error);
    main.innerHTML = `<div class="msg err">${esc(error.message)}</div>`;
  }
}

  if (!currentUser) {

async function handleProfileVote(candidate, direction) {
  if (!currentUser) { go("/login"); return; }
  const upBtn = document.getElementById("profileUp");
  const downBtn = document.getElementById("profileDown");
  const currentDirection = upBtn.classList.contains("on-up") ? "up" : (downBtn.classList.contains("on-down") ? "down" : null);

  const snapshot = { upvotes: candidate.upvotes || 0, downvotes: candidate.downvotes || 0, currentDirection };
  const paint = () => {
    upBtn.textContent = `▲ ${candidate.upvotes || 0}`;
    downBtn.textContent = `▼ ${candidate.downvotes || 0}`;
  };

  // Update the screen immediately - the click should feel instant.
  const myVotes = { [candidate.id]: currentDirection };
  const bump = (id, dir, delta) => {
    if (id !== candidate.id) return; // only this one candidate is on screen
    const key = dir === "up" ? "upvotes" : "downvotes";
    candidate[key] = Math.max(0, (candidate[key] || 0) + delta);
  };
  const newDirection = applyOptimisticVote(myVotes, bump, candidate.id, direction);
  paint();
  upBtn.classList.toggle("on-up", newDirection === "up");
  downBtn.classList.toggle("on-down", newDirection === "down");

  try {
    const result = !hasFirebaseConfig
      ? applyDemoVote(candidate.id, candidate.institutionId, direction)
      : await apiJson("/votes", { method: "POST", body: { candidateId: candidate.id, direction } });
    candidate.upvotes = result.upvotes;
    candidate.downvotes = result.downvotes;
    paint();
    upBtn.classList.toggle("on-up", result.direction === "up");
    downBtn.classList.toggle("on-down", result.direction === "down");
    loadTicker();
  } catch (error) {
    candidate.upvotes = snapshot.upvotes;
    candidate.downvotes = snapshot.downvotes;
    paint();
    upBtn.classList.toggle("on-up", snapshot.currentDirection === "up");
    downBtn.classList.toggle("on-down", snapshot.currentDirection === "down");
    showToast(error.message || "Vote didn't go through, try again.", "err");
  }
}

async function generateShareCard(candidate, rank, totalConfirmed) {
  const canvas = document.getElementById("shareCanvas");
  const ctx = canvas.getContext("2d");
  const W = canvas.width, H = canvas.height;

  const bgGrad = ctx.createLinearGradient(0, 0, 0, H);
  bgGrad.addColorStop(0, "#121216");
  bgGrad.addColorStop(1, "#09090a");
  ctx.fillStyle = bgGrad;
  ctx.fillRect(0, 0, W, H);

  ctx.strokeStyle = "#2c2c34";
  ctx.lineWidth = 3;
  ctx.strokeRect(24, 24, W - 48, H - 48);

  ctx.fillStyle = "#f0b429";
  ctx.font = "bold 34px Arial";
  ctx.fillText("MOGGOFF", 60, 100);

  ctx.fillStyle = "#62626c";
  ctx.font = "20px Arial";
  ctx.fillText((candidate.gender === "chad" ? "CHAD" : "STACY") + " LEADERBOARD", 60, 132);

  const photo = await loadImageSafe(candidate.photoURL || placeholder(candidate.name));
  const cx = W / 2, cy = 430, radius = 220;
  ctx.save();
  ctx.beginPath();
  ctx.arc(cx, cy, radius, 0, Math.PI * 2);
  ctx.closePath();
  ctx.clip();
  if (photo) {
    const scale = Math.max((radius * 2) / photo.width, (radius * 2) / photo.height);
    const w = photo.width * scale, h = photo.height * scale;
    ctx.drawImage(photo, cx - w / 2, cy - h / 2, w, h);
  } else {
    ctx.fillStyle = "#1b1b21";
    ctx.fillRect(cx - radius, cy - radius, radius * 2, radius * 2);
  }
  ctx.restore();
  ctx.beginPath();
  ctx.arc(cx, cy, radius, 0, Math.PI * 2);
  ctx.strokeStyle = "#f0b429";
  ctx.lineWidth = 6;
  ctx.stroke();

  ctx.fillStyle = "#f1f1ef";
  ctx.font = "bold 48px Arial";
  ctx.textAlign = "center";
  ctx.fillText(candidate.name, cx, 730);

  ctx.fillStyle = "#96969f";
  ctx.font = "24px Arial";
  ctx.fillText(candidate.institutionName || "", cx, 768);

  ctx.fillStyle = "#f0b429";
  ctx.font = "bold 64px Arial";
  ctx.fillText(rank ? `#${rank}${totalConfirmed ? ` / ${totalConfirmed}` : ""}` : "RANKED", cx, 860);

  ctx.fillStyle = "#7dd3fc";
  ctx.font = "26px Arial";
  ctx.fillText(`${candidate.upvotes || 0} upvotes`, cx, 910);

  ctx.textAlign = "left";
  const dataUrl = canvas.toDataURL("image/png");
  const img = document.getElementById("shareCardImg");
  img.src = dataUrl;
  img.style.display = "block";
  const downloadBtn = document.getElementById("downloadShareBtn");
  downloadBtn.style.display = "inline-block";
  downloadBtn.onclick = () => {
    const link = document.createElement("a");
    link.href = dataUrl;
    link.download = `${candidate.name.replace(/[^a-z0-9]+/gi, "-").toLowerCase()}-moggoff.png`;
    link.click();
  };
}

function loadImageSafe(src) {
  return new Promise(resolve => {
    const img = new Image();
    img.crossOrigin = "anonymous";
    img.onload = () => resolve(img);
    img.onerror = () => resolve(null);
    img.src = src;
  });
}

async function handleVote(candidateId, institutionId, direction, gender) {
  if (!currentUser) {
    go("/login");
    return;
  }
  if (!leaderboardState || leaderboardState.institutionId !== institutionId) return;
  const { candidates, myVotes } = leaderboardState;
  const candidate = candidates.find(item => item.id === candidateId);
  if (!candidate) return;

  // Snapshot so we can roll back instantly if the request fails.
  const snapshot = { candidates: candidates.map(item => ({ ...item })), myVotes: { ...myVotes } };
  const bump = (id, dir, delta) => {
    const item = candidates.find(c => c.id === id);
    if (!item) return;
    const key = dir === "up" ? "upvotes" : "downvotes";
    item[key] = Math.max(0, (item[key] || 0) + delta);
    item.score = (item.upvotes || 0) - (item.downvotes || 0);
  };

  // Update the screen immediately - the click should feel instant.
  applyOptimisticVote(myVotes, bump, candidateId, direction);
  candidates.sort((a, b) => (b.score ?? b.upvotes ?? 0) - (a.score ?? a.upvotes ?? 0));
  renderCandidateList();

  try {
    const result = !hasFirebaseConfig
      ? applyDemoVote(candidateId, institutionId, direction)
      : await apiJson("/votes", { method: "POST", body: { candidateId, direction } });
    // Reconcile the clicked candidate with the server's authoritative numbers
    // (covers the rare case where our optimistic guess didn't quite match).
    candidate.upvotes = result.upvotes;
    candidate.downvotes = result.downvotes;
    candidate.score = result.score;
    if (result.direction) myVotes[candidateId] = result.direction;
    else delete myVotes[candidateId];
    candidates.sort((a, b) => (b.score ?? b.upvotes ?? 0) - (a.score ?? a.upvotes ?? 0));
    renderCandidateList();
    loadTicker();
  } catch (error) {
    leaderboardState.candidates = snapshot.candidates;
    leaderboardState.myVotes = snapshot.myVotes;
    renderCandidateList();
    showToast(error.message || "Vote didn't go through, try again.", "err");
  }
}

  const isOwn = currentUserDoc?.handle === handle;
  const links = Object.entries(SOCIAL_META)
    .filter(([key]) => profile.socialLinks?.[key])
    .map(([key, meta]) => `<a class="social-pill" href="${esc(profile.socialLinks[key])}" target="_blank" rel="noopener">${meta.icon} ${meta.label}</a>`)
    .join("");

  main.innerHTML = `
    <div class="profile-banner-wrap">
      <img class="profile-banner" id="bannerImg" src="${profile.bannerURL || ""}" alt="" style="${profile.bannerURL ? "" : "display:none"}">
      ${profile.bannerURL ? "" : `<div class="profile-banner"></div>`}
      <img class="profile-avatar-lg" src="${profile.avatarURL || placeholder(profile.displayName || handle)}" alt="">
      ${isOwn ? `<button class="btn btn-secondary btn-sm profile-edit-btn" id="editProfileBtn">Edit profile</button>` : ""}
    </div>
    <h1 style="margin:0 0 2px">${esc(profile.displayName || `@${handle}`)}</h1>
    <p class="sub" style="margin:0">@${esc(handle)}</p>
    ${profile.bio ? `<p class="sub" style="margin:14px 0">${esc(profile.bio)}</p>` : ""}
    ${links ? `<div class="social-row">${links}</div>` : ""}
    <div id="profileEditorHost"></div>
    <div class="eyebrow" style="margin-top:28px">Ranked at</div>
    <div style="margin-top:12px">
      ${listings.length ? listings.map(item => `
        <a class="listing-chip" href="#/candidate/${item.id}">
          <span>${esc(item.institutionName || "")} - ${item.gender === "chad" ? "CHAD" : "STACY"}</span>
          <span class="candidate-meta">score ${item.score || 0}</span>
        </a>`).join("") : `<div class="empty">Not on any boards yet.</div>`}
    </div>
  `;

  if (isOwn) {
    document.getElementById("editProfileBtn").onclick = () => renderProfileEditor(profile);
  }
}

function renderProfileEditor(profile) {
  const host = document.getElementById("profileEditorHost");
  host.innerHTML = `
    <div class="card" style="margin-top:16px">
      <div class="eyebrow">Edit your profile</div>
      <div id="profileEditMsg"></div>
      <div class="field">
        <label>Banner</label>
        <button class="drop" id="bannerDrop" type="button">Click to upload a banner image</button>
        <input id="bannerInput" type="file" accept="image/*" hidden>
      </div>
      <div class="field">
        <label>Avatar</label>
        <button class="drop" id="avatarDrop" type="button">Click to upload a profile photo</button>
        <input id="avatarInput" type="file" accept="image/*" hidden>
      </div>
      <div class="field"><label>Display name</label><input id="profileDisplayName" type="text" maxlength="90" placeholder="Shown above your handle" value="${esc(profile.displayName || "")}"></div>
      <div class="field"><label>Bio (max 280 characters)</label><textarea id="profileBio" rows="3" maxlength="280">${esc(profile.bio || "")}</textarea></div>
      ${Object.entries(SOCIAL_META).map(([key, meta]) => `
        <div class="field"><label>${meta.label}</label><input id="social_${key}" type="url" placeholder="https://..." value="${esc(profile.socialLinks?.[key] || "")}"></div>
      `).join("")}
      <button class="btn" id="profileSaveBtn" style="width:100%">Save profile</button>
    </div>
  `;
  const msg = document.getElementById("profileEditMsg");

  document.getElementById("bannerDrop").onclick = () => document.getElementById("bannerInput").click();
  document.getElementById("bannerInput").onchange = async event => {
    const file = event.target.files[0];
    if (!file) return;
    try {
      const photoURL = await uploadBanner(file);
      await updateMyBanner(photoURL);
      document.getElementById("bannerImg").src = photoURL;
      document.getElementById("bannerImg").style.display = "";
      msg.innerHTML = `<div class="msg ok">Banner updated.</div>`;
    } catch (error) {
      msg.innerHTML = `<div class="msg err">${esc(error.message)}</div>`;
    }
  };
  document.getElementById("avatarDrop").onclick = () => document.getElementById("avatarInput").click();
  document.getElementById("avatarInput").onchange = async event => {
    const file = event.target.files[0];
    if (!file) return;
    try {
      const photoURL = await uploadPhoto(file);
      await updateMyAvatar(photoURL);
      document.querySelector(".profile-avatar-lg").src = photoURL;
      msg.innerHTML = `<div class="msg ok">Avatar updated.</div>`;
    } catch (error) {
      msg.innerHTML = `<div class="msg err">${esc(error.message)}</div>`;
    }
  };
  document.getElementById("profileSaveBtn").onclick = async () => {
    const button = document.getElementById("profileSaveBtn");
    button.disabled = true;
    button.textContent = "Saving...";
    const displayName = document.getElementById("profileDisplayName").value.trim();
    const bio = document.getElementById("profileBio").value.trim().slice(0, 280);
    const socialLinks = {};
    Object.keys(SOCIAL_META).forEach(key => { socialLinks[key] = document.getElementById(`social_${key}`).value.trim(); });
    try {
      await updateMyProfile({ displayName, bio, socialLinks });
      msg.innerHTML = `<div class="msg ok">Saved. This updates everywhere you're listed.</div>`;
    } catch (error) {
      msg.innerHTML = `<div class="msg err">${esc(error.message)}</div>`;
    } finally {
      button.disabled = false;
      button.textContent = "Save profile";
    }
  };
}

async function loadTicker() {
  const candidates = await getCandidates({ status: "confirmed" });
  const top = candidates.sort((a, b) => (b.score || b.upvotes || 0) - (a.score || a.upvotes || 0)).slice(0, 10);
  const track = document.getElementById("tickerTrack");
  if (!top.length) {
    track.innerHTML = `<span class="ticker-item">no confirmed rankings yet</span>`;
    return;
  }
  const items = top.map((candidate, index) => `<span class="ticker-item"><span class="ticker-rank">#${index + 1}</span><b>${esc(candidate.name)}</b><span class="ticker-score">${candidate.upvotes || 0} UP</span></span>`).join("");
  track.innerHTML = items + items;
}
